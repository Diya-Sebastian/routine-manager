<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diya Routine Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="logo">🌸 Diya</h2>

            <nav>
                <button class="nav-btn active" data-page="dashboard">Dashboard</button>
                <button class="nav-btn" data-page="timetable">Timetable</button>
                <button class="nav-btn" data-page="tasks">Tasks</button>
                <button class="nav-btn" data-page="assignments">Assignments</button>
                <button class="nav-btn" data-page="habits">Habits</button>
                <button class="nav-btn" data-page="focus">Focus</button>
                <button class="nav-btn" data-page="stats">Stats</button>
                <button class="nav-btn" id="darkToggle">Toggle Dark</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content">

            <section id="dashboard" class="page active">
                <h1>Dashboard</h1>
                <div class="card">Welcome back 🌷</div>
            </section>

            <section id="timetable" class="page">
                <h1>Weekly Timetable</h1>
                <div class="card">Timetable coming soon...</div>
            </section>

            <section id="tasks" class="page">
                <h1>Tasks</h1>
                <div class="card">Task system coming soon...</div>
            </section>

            <section id="assignments" class="page">
                <h1>Assignments</h1>
                <div class="card">Assignment manager coming soon...</div>
            </section>

            <section id="habits" class="page">
                <h1>Habits</h1>
                <div class="card">Habit tracker coming soon...</div>
            </section>

            <section id="focus" class="page">
                <h1>Focus Mode</h1>
                <div class="card">Pomodoro timer coming soon...</div>
            </section>

            <section id="stats" class="page">
                <h1>Analytics</h1>
                <div class="card">Statistics coming soon...</div>
            </section>

        </main>

    </div>

    <!-- JS Files -->
    <script src="data.js"></script>
    <script src="app.js"></script>

</body>
</html>
